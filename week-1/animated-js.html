<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Week 1 - Transities met JavaScript</title>
        <link rel="stylesheet" href="./animated-js.css">
    </head>
    <body>
        <main>
            <h1>Transities met JavaScript</h1>

            <section>
                <h2>Box Animation</h2>

                <div class="box" data-pizza="pepperoni" data-crust="cheesy" data-animation="customRotation"
                    data-name="main-animation"></div>
            </section>

            <section>
                <h2 data-pizza="margarita" data-animation="customRotation" data-rotation="180">Button Animation</h2>

                <button data-controls="play">Play</button>
                <button data-controls="play" data-target="main-animation">Play element with name main animation</button>
                <button data-controls="pause">Pause</button>
                <button data-controls="reset">Reset time to 0</button>

                <a href="/" class="btn">Go home</a>
            </section>

            <section>
                <h2>Box Keyframes</h2>

                <div data-animation="fade-in" class="box keyframed"></div>
            </section>

            <section>
                <h2 data-animation="fade-in">Loading</h2>

                <div class="bar"></div>
            </section>
        </main>

        <script src="./animated-js.js"></script>
    </body>
</html>
