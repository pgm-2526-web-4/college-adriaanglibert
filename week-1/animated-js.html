<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Week 1 - Transities met JavaScript</title>
        <link rel="stylesheet" href="./animated-js.css">
    </head>
    <body>
        <main>
            <h1>Transities met JavaScript</h1>

            <section>
                <h2>Box Animation</h2>

                <div class="box" data-pizza="pepperoni" data-crust="cheesy" data-animation="customRotation"></div>
            </section>

            <section>
                <h2 data-pizza="margarita" data-animation="customRotation" data-rotation="180">Button Animation</h2>

                <button>Play</button>
                <button>Pause</button>
                <button>Reset time to 0</button>

                <a href="/" class="btn">Go home</a>
            </section>

            <section>
                <h2>Box Keyframes</h2>

                <div class="box keyframed"></div>
            </section>

            <section>
                <h2>Loading</h2>

                <div class="bar"></div>
            </section>
        </main>

        <script src="./animated-js.js"></script>
    </body>
</html>
