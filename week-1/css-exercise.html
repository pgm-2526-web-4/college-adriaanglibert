<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Exercise</title>
        <link rel="stylesheet" href="./css-exercise.css">
    </head>
    <body>
        <main>
            <h1>Oefeningen</h1>

            <section>
                <h2>Loading</h2>

                <div class="spinner">
                    <span class="sr-only">Loading</span>
                </div>
            </section>

            <section>
                <h2>Button</h2>

                <button class="btn">
                    <span class="btn__text">Bericht versturen</span>
                </button>
            </section>

            <section>
                <h2>Button en Loader</h2>

                <button class="btn">
                    <span class="btn__text">Bericht versturen</span>

                    <div class="spinner btn__loader">
                        <span class="sr-only">Loading</span>
                    </div>
                </button>
            </section>
        </main>
    </body>
</html>
