<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8"/>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>GSAP - Parallax</title>
	</head>
	<body>
		<header class="hero" data-animation="parallax">
			<img class="hero__image hero__image--top" data-child="parallax" data-move="-200" src="/asset_0.png" alt="">
			<img class="hero__image hero__image--top" src="/asset_1.png" alt="">
			<img class="hero__image hero__image--bottom" data-child="parallax" data-move="20" src="/asset_2.png" alt="">
		</header>

		<main>
			<section>
				<h2>About me</h2>

				<div class="columns">
					<figure class="columns__col mask" data-animation="parallax-image">
						<img class="mask__image" src="https://picsum.photos/800/1000" alt="">
					</figure>

					<figure class="columns__col mask" data-animation="parallax-image">
						<img class="mask__image" src="https://picsum.photos/1000/800" alt="">
					</figure>

					<figure class="columns__col mask" data-animation="parallax-image">
						<img class="mask__image" src="https://picsum.photos/850/850" alt="">
					</figure>
				</div>
			</section>
		</main>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
